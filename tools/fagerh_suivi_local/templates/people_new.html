{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h3>Créer une personne</h3>
  <form method="post" class="grid">
    <div class="grid grid-2">
      <div><label>Nom *</label><input name="nom" required></div>
      <div><label>Prénom *</label><input name="prenom" required></div>
    </div>
    <div class="grid grid-3">
      <div><label>Date de naissance</label><input type="date" name="date_naissance"></div>
      <div><label>Identifiant local</label><input name="identifiant_local" placeholder="Ex: dossier interne"></div>
      <div>
        <label>Statut BOETH</label>
        <select name="boeth_statut">
          <option value="inconnu">Je ne sais pas</option>
          <option value="boeth">BOETH</option>
          <option value="non_boeth">Non BOETH</option>
        </select>
      </div>
    </div>
    <div class="grid grid-2">
      <div>
        <label>Handicap principal</label>
        <select name="handicap_principal">
          <option value="">--</option>
          {% for h in handicap_types %}<option value="{{ h }}">{{ h }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label>Handicap associé</label>
        <select name="handicap_associe">
          <option value="">--</option>
          {% for h in handicap_types %}<option value="{{ h }}">{{ h }}</option>{% endfor %}
        </select>
      </div>
    </div>
    <div><button type="submit">Créer</button></div>
  </form>
</div>
{% endblock %}
